    default: op
  antidumper.bypass.behaviour-check:
    description: Bypass BehaviourCheck
    default: op
  antidumper.bypass.siege-mode:
    description: Bypass SiegeMode
    default: op
  antidumper.bypass.uuid-whitelist:
    description: Bypass UUIDWhitelist
    default: op
  antidumper.admin:
    description: Plugin administration
    default: op
  antidumper.alert:
    description: Receive staff alerts
    default: op
  antidumper.punish.exempt:
    description: Immune to auto-punishment
    default: op
  antidumper.commandwhitelist.bypass:
    description: Bypass command whitelist
    default: op
