name: AntiDumper
version: 3.0
main: com.s1steam.antidumper.AntiDumperPlugin
author: S1sTeam
api-version: '1.21'
softdepend: [ProtocolLib]
load: STARTUP

commands:
  antidumper:
    description: Управление AntiDumper
    usage: /antidumper [reload]
    aliases: [ad]

permissions:
  antidumper.bypass:
    description: Bypass ALL protection checks
    default: op
  antidumper.bypass.packet-limiter:
    description: Bypass PacketLimiter
    default: op
  antidumper.bypass.anti-book-ban:
    description: Bypass AntiBookBan
    default: op
  antidumper.bypass.anti-chunk-ban:
    description: Bypass AntiChunkBan
    default: op
  antidumper.bypass.anti-lag-machine:
    description: Bypass AntiLagMachine
    default: op
  antidumper.bypass.anti-phase:
    description: Bypass AntiPhase
    default: op
  antidumper.bypass.anti-blink:
    description: Bypass AntiBlink
    default: op
  antidumper.bypass.anti-timer:
    description: Bypass AntiTimer
    default: op
  antidumper.bypass.anti-no-fall:
    description: Bypass AntiNoFall
    default: op
  antidumper.bypass.anti-boat-fly:
    description: Bypass AntiBoatFly
    default: op
  antidumper.bypass.anti-elytra-fly:
    description: Bypass AntiElytraFly
    default: op
  antidumper.bypass.anti-auto-pearl:
    description: Bypass AntiAutoPearl
    default: op
  antidumper.bypass.anti-inventory-move:
