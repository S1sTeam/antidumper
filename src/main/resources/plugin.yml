    default: op
  antidumper.bypass.anti-tower:
    description: Bypass AntiTower
    default: op
  antidumper.bypass.anti-scaffold:
    description: Bypass AntiScaffold
    default: op
  antidumper.bypass.anti-nbt:
    description: Bypass AntiNBT
    default: op
  antidumper.bypass.anti-command-exploit:
    description: Bypass AntiCommandExploit
    default: op
  antidumper.bypass.anti-world-downloader:
    description: Bypass AntiWorldDownloader
    default: op
  antidumper.bypass.anti-plugin-stealer:
    description: Bypass AntiPluginStealer
    default: op
  antidumper.bypass.anti-command-dump:
    description: Bypass AntiCommandDump
    default: op
  antidumper.bypass.anti-file-steal:
