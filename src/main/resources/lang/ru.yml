# Русская локализация AntiDumper v2.0
#
# Поддержка цветов (Color codes support):
#   Legacy: &0-9 &a-f &k-o &r
#   RGB hex: &#RRGGBB (например &#FF6600 для оранжевого)
#   Пример: "&#FF5555Красный текст&#AA5555 и золотой &6текст"
#   Юникод: \u00a7 или прямые символы ★

commands:
